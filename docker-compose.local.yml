version: '3.9'

services:
  backend:
    build:
      context: ./hr_payroll_backend
      dockerfile: Dockerfile
      args:
        REQUIREMENTS_FILE: requirements/local.txt
    env_file:
      - ./hr_payroll_backend/.env/.local/.django
      - ./hr_payroll_backend/.env/.local/.postgres
    environment:
      DJANGO_ENV: local
      DB_ENGINE: postgres
      POSTGRES_HOST: postgres
    volumes:
      - ./hr_payroll_backend:/app
    ports:
      - '8001:8001'
    depends_on:
      - postgres
      - redis
      - mailhog
    command: python manage.py runserver 0.0.0.0:8001
    networks:
      - app_net

  celery:
    build:
      context: ./hr_payroll_backend
      dockerfile: Dockerfile
      args:
        REQUIREMENTS_FILE: requirements/local.txt
    env_file:
      - ./hr_payroll_backend/.env/.local/.django
      - ./hr_payroll_backend/.env/.local/.postgres
    environment:
      DJANGO_ENV: local
      DB_ENGINE: postgres
      POSTGRES_HOST: postgres
    volumes:
      - ./hr_payroll_backend:/app
    depends_on:
      - backend
      - redis
    command: celery -A config.celery worker -l info
    networks:
      - app_net

  test:
    build:
      context: ./hr_payroll_backend
      dockerfile: Dockerfile
      args:
        REQUIREMENTS_FILE: requirements/local.txt
    env_file:
      - ./hr_payroll_backend/.env/.local/.django
      - ./hr_payroll_backend/.env/.local/.postgres
    environment:
      DJANGO_ENV: local
      DB_ENGINE: postgres
      POSTGRES_HOST: postgres
    volumes:
      - ./hr_payroll_backend:/app
    depends_on:
      - postgres
      - redis
    command: python manage.py test
    networks:
      - app_net

  postgres:
    image: postgres:16-alpine
    env_file:
      - ./hr_payroll_backend/.env/.local/.postgres
    ports:
      - '5432:5432'
    volumes:
      - pgdata_local:/var/lib/postgresql/data
    networks:
      - app_net

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    networks:
      - app_net

  mailhog:
    image: mailhog/mailhog
    ports:
      - '8025:8025'
      - '1025:1025'
    networks:
      - app_net

  frontend:
    build:
      context: ./hr_payroll_front
      dockerfile: Dockerfile
      target: dev
    environment:
      VITE_API_BASE: http://localhost:8001/api/v1
    volumes:
      - ./hr_payroll_front:/app
      - /app/node_modules
    ports:
      - '5173:5173'
    depends_on:
      - backend
    networks:
      - app_net

volumes:
  pgdata_local:

networks:
  app_net:
    driver: bridge
