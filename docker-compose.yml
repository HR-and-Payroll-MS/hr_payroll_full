services:
  db:
    image: postgres:16-alpine
    env_file:
      - ./.envs/.local/.postgres
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hr_payroll -d hr_payroll"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_net

  backend:
    build:
      context: ./hr_payroll_backend
      args:
        REQUIREMENTS_FILE: requirements/local.txt
    env_file:
      - ./.envs/.local/.django
      - ./.envs/.local/.postgres
    volumes:
      - ./hr_payroll_backend:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    networks:
      - app_net

  frontend:
    build:
      context: ./hr_payroll_front
      target: dev
    environment:
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./hr_payroll_front:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - app_net

  tests:
    build:
      context: ./hr_payroll_backend
      args:
        REQUIREMENTS_FILE: requirements/local.txt
    profiles: ["test"]
    env_file:
      - ./.envs/.local/.django
      - ./.envs/.local/.postgres
    volumes:
      - ./hr_payroll_backend:/app
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "python manage.py migrate && python manage.py test"
    networks:
      - app_net

volumes:
  db_data:

networks:
  app_net:
    driver: bridge
